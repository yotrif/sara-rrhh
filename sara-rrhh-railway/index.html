<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Asistente Recursos Humanos Chat</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0c0e14;
      --surface:   #13161f;
      --surface2:  #1a1e2b;
      --border:    #252a3a;
      --accent:    #4fffb0;
      --accent2:   #7c6fff;
      --user-bg:   #1e2540;
      --bot-bg:    #161b28;
      --text:      #e8eaf2;
      --muted:     #6b7190;
      --danger:    #ff5e7a;
      --radius:    18px;
      --font-ui:   'Syne', sans-serif;
      --font-body: 'DM Sans', sans-serif;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      font-size: 15px;
      line-height: 1.6;
      overflow: hidden;
    }

    /* ── LAYOUT ── */
    .shell {
      display: grid;
      grid-template-rows: auto 1fr auto;
      height: 100dvh;
      max-width: 820px;
      margin: 0 auto;
      position: relative;
    }

    /* ── GRID BACKGROUND ── */
    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0;
      background-image:
        linear-gradient(rgba(79,255,176,.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(79,255,176,.025) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
    }

    /* Radial glow */
    body::after {
      content: '';
      position: fixed;
      top: -20%; left: 50%;
      transform: translateX(-50%);
      width: 700px; height: 500px;
      background: radial-gradient(ellipse, rgba(124,111,255,.10) 0%, transparent 70%);
      pointer-events: none; z-index: 0;
    }

    /* ── HEADER ── */
    header {
      position: relative; z-index: 10;
      display: flex; align-items: center; gap: 14px;
      padding: 18px 24px;
      border-bottom: 1px solid var(--border);
      background: rgba(13,15,21,.85);
      backdrop-filter: blur(16px);
    }

    .avatar {
      width: 42px; height: 42px;
      border-radius: 12px;
      background: linear-gradient(135deg, var(--accent2), var(--accent));
      display: grid; place-items: center;
      font-size: 20px;
      flex-shrink: 0;
      box-shadow: 0 0 0 1px rgba(79,255,176,.3), 0 4px 24px rgba(124,111,255,.25);
    }

    .header-info { flex: 1; }
    .header-info h1 {
      font-family: var(--font-ui);
      font-size: 15px; font-weight: 700;
      letter-spacing: .03em;
      color: var(--text);
    }

    .status {
      display: flex; align-items: center; gap: 6px;
      font-size: 12px; color: var(--muted);
      margin-top: 2px;
    }
    .status-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 6px var(--accent);
      animation: pulse-dot 2s ease-in-out infinite;
    }
    @keyframes pulse-dot {
      0%,100% { opacity:1; transform:scale(1); }
      50% { opacity:.5; transform:scale(.85); }
    }

    .header-actions { display: flex; gap: 8px; }
    .btn-icon {
      width: 34px; height: 34px; border-radius: 9px;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--muted); cursor: pointer;
      display: grid; place-items: center;
      transition: all .2s;
    }
    .btn-icon:hover { color: var(--text); border-color: var(--accent); background: rgba(79,255,176,.06); }
    .btn-icon svg { width: 16px; height: 16px; }

    /* ── MESSAGES ── */
    .messages {
      position: relative; z-index: 5;
      overflow-y: auto;
      padding: 24px 20px;
      display: flex; flex-direction: column; gap: 14px;
      scroll-behavior: smooth;
    }

    .messages::-webkit-scrollbar { width: 4px; }
    .messages::-webkit-scrollbar-track { background: transparent; }
    .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    /* Date separator */
    .date-sep {
      text-align: center; font-size: 11px;
      color: var(--muted); letter-spacing: .06em;
      text-transform: uppercase;
      position: relative;
    }
    .date-sep::before {
      content: ''; position: absolute; top: 50%;
      left: 0; right: 0; height: 1px; background: var(--border);
    }
    .date-sep span { background: var(--bg); position: relative; padding: 0 10px; }

    /* Message row */
    .msg-row {
      display: flex; gap: 10px; align-items: flex-end;
      animation: msg-in .3s cubic-bezier(.25,.8,.25,1) both;
    }
    @keyframes msg-in {
      from { opacity:0; transform:translateY(12px); }
      to   { opacity:1; transform:translateY(0); }
    }

    .msg-row.user { flex-direction: row-reverse; }

    .msg-avatar {
      width: 30px; height: 30px; border-radius: 9px;
      flex-shrink: 0; display: grid; place-items: center;
      font-size: 14px; margin-bottom: 2px;
    }
    .msg-avatar.bot {
      background: linear-gradient(135deg, var(--accent2), var(--accent));
      box-shadow: 0 0 12px rgba(79,255,176,.15);
    }
    .msg-avatar.user { background: var(--user-bg); border: 1px solid var(--border); }

    .bubble {
      max-width: 72%; padding: 11px 16px;
      border-radius: var(--radius);
      font-size: 14.5px; line-height: 1.65;
      position: relative;
    }

    .msg-row.bot .bubble {
      background: var(--bot-bg);
      border: 1px solid var(--border);
      border-bottom-left-radius: 5px;
      color: var(--text);
    }
    .msg-row.user .bubble {
      background: var(--user-bg);
      border: 1px solid rgba(124,111,255,.35);
      border-bottom-right-radius: 5px;
      color: var(--text);
    }

    .bubble-meta {
      font-size: 10.5px; color: var(--muted);
      margin-top: 5px; display: flex; align-items: center; gap: 5px;
    }
    .msg-row.user .bubble-meta { justify-content: flex-end; }

    /* Typing indicator */
    .typing-bubble {
      background: var(--bot-bg); border: 1px solid var(--border);
      border-bottom-left-radius: 5px;
      padding: 14px 18px;
      display: flex; align-items: center; gap: 5px;
    }
    .typing-bubble span {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--muted); display: block;
      animation: typing-bounce .9s ease-in-out infinite;
    }
    .typing-bubble span:nth-child(2) { animation-delay: .15s; }
    .typing-bubble span:nth-child(3) { animation-delay: .30s; }
    @keyframes typing-bounce {
      0%,80%,100% { transform:translateY(0); opacity:.4; }
      40% { transform:translateY(-6px); opacity:1; }
    }

    /* ── INPUT AREA ── */
    .input-area {
      position: relative; z-index: 10;
      padding: 16px 20px 20px;
      border-top: 1px solid var(--border);
      background: rgba(13,15,21,.9);
      backdrop-filter: blur(16px);
    }

    .input-wrap {
      display: flex; align-items: flex-end; gap: 10px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 10px 10px 10px 18px;
      transition: border-color .2s, box-shadow .2s;
    }
    .input-wrap:focus-within {
      border-color: rgba(79,255,176,.4);
      box-shadow: 0 0 0 3px rgba(79,255,176,.06);
    }

    #chat-input {
      flex: 1; background: none; border: none; outline: none;
      color: var(--text); font-family: var(--font-body); font-size: 14.5px;
      resize: none; min-height: 24px; max-height: 140px; line-height: 1.55;
    }
    #chat-input::placeholder { color: var(--muted); }

    .send-btn {
      width: 38px; height: 38px; border-radius: 11px;
      border: none; cursor: pointer; flex-shrink: 0;
      background: linear-gradient(135deg, var(--accent2), var(--accent));
      display: grid; place-items: center;
      transition: transform .15s, opacity .15s, box-shadow .2s;
    }
    .send-btn:hover { transform: scale(1.06); box-shadow: 0 4px 20px rgba(79,255,176,.3); }
    .send-btn:active { transform: scale(.97); }
    .send-btn.off { opacity: .35; cursor: not-allowed; transform: none; }
    .send-btn svg { width: 17px; height: 17px; color: #0c0e14; }

    .input-hint {
      font-size: 11px; color: var(--muted);
      text-align: center; margin-top: 8px;
      letter-spacing: .02em;
    }
    .input-hint kbd {
      font-family: var(--font-ui);
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 4px; padding: 0 4px; font-size: 10px;
    }

    /* ── WELCOME CARD ── */
    .welcome {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; gap: 16px;
      flex: 1; text-align: center; padding: 40px 20px;
      animation: msg-in .5s ease both;
    }
    .welcome-icon {
      width: 64px; height: 64px; border-radius: 18px;
      background: linear-gradient(135deg, var(--accent2), var(--accent));
      display: grid; place-items: center; font-size: 28px;
      box-shadow: 0 0 0 1px rgba(79,255,176,.2), 0 12px 40px rgba(124,111,255,.3);
    }
    .welcome h2 {
      font-family: var(--font-ui); font-size: 22px; font-weight: 700;
      background: linear-gradient(135deg, var(--text), var(--muted));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .welcome p { color: var(--muted); max-width: 380px; font-size: 14px; }

    .suggestions { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-top: 4px; }
    .sug-btn {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 24px; padding: 8px 16px;
      color: var(--muted); font-size: 13px; cursor: pointer;
      font-family: var(--font-body);
      transition: all .2s;
    }
    .sug-btn:hover { color: var(--text); border-color: var(--accent); background: rgba(79,255,176,.06); }

    /* ── TOAST ── */
    .toast {
      position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%) translateY(20px);
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 12px; padding: 10px 20px;
      font-size: 13px; color: var(--text);
      opacity: 0; transition: all .3s; z-index: 100;
      pointer-events: none;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .toast.error { border-color: var(--danger); color: var(--danger); }

    /* ── RESPONSIVE ── */
    @media (max-width: 600px) {
      .bubble { max-width: 88%; }
      header { padding: 14px 16px; }
      .messages { padding: 16px 12px; }
      .input-area { padding: 12px 12px 16px; }
    }
  </style>
</head>
<body>
<div class="shell">

  <!-- HEADER -->
  <header>
    <div class="avatar">👔</div>
    <div class="header-info">
      <h1>Asistente TechCorp S.A.S.</h1>
      <div class="status">
        <span class="status-dot"></span>
        <span id="status-text">En línea · Listo para ayudarte</span>
      </div>
    </div>
    <div class="header-actions">
      <!-- Clear chat -->
      <button class="btn-icon" id="clear-btn" title="Limpiar conversación">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/>
        </svg>
      </button>
    </div>
  </header>

  <!-- MESSAGES -->
  <div class="messages" id="messages">
    <div class="welcome" id="welcome">
      <div class="welcome-icon">💁🏻‍</div>
      <h2>Hola, soy sara </h2>
      <p>Puedes preguntarme lo que necesites 💪.</p>
      <div class="suggestions">
        <button class="sug-btn">¿Qué puedes hacer?</button>
        <button class="sug-btn">Ayúdame a solicitar un certificado</button>
        <button class="sug-btn">Hay vacantes disponibles?</button>
      </div>
    </div>
  </div>

  <!-- INPUT -->
  <div class="input-area">
    <div class="input-wrap">
      <input type="text" id="chat-input" placeholder="Escribe tu mensaje…" autocomplete="off" autocorrect="off"/>
      <button class="send-btn" id="send-btn">
        <svg viewBox="0 0 24 24" fill="currentColor">
          <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
        </svg>
      </button>
    </div>
    <p class="input-hint">Presiona <kbd>Enter</kbd> para enviar · <kbd>Shift+Enter</kbd> para nueva línea</p>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
  // ─── CONFIGURATION ────────────────────────────────────────────
  // Replace this URL with your n8n webhook URL
  const N8N_WEBHOOK_URL = 'https://yotrif.app.n8n.cloud/webhook/cc7ba324-b263-42fa-ab09-b10e412d96d6';
  // ──────────────────────────────────────────────────────────────

  const messagesEl = document.getElementById('messages');
  const inputEl    = document.getElementById('chat-input');
  const sendBtn    = document.getElementById('send-btn');
  const clearBtn   = document.getElementById('clear-btn');
  const statusEl   = document.getElementById('status-text');
  const welcomeEl  = document.getElementById('welcome');
  const toastEl    = document.getElementById('toast');

  // Session ID
  const sessionId = 'session_' + Math.random().toString(36).slice(2);
  let isThinking = false;

  // ── AUTO RESIZE TEXTAREA ──
  ['input','keyup','change'].forEach(ev => inputEl.addEventListener(ev, () => {
  //No necesita
    sendBtn.classList.toggle('off', !inputEl.value.trim());
  }));

  // ── KEYBOARD SEND ──
  inputEl.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      if (!isThinking && inputEl.value.trim()) sendMessage();
    }
  });

sendBtn.addEventListener('click', () => {
    if (!isThinking && inputEl.value.trim()) sendMessage();
  });
  sendBtn.addEventListener('touchend', (e) => {
    e.preventDefault();
    if (!isThinking && inputEl.value.trim()) sendMessage();
  });
  clearBtn.addEventListener('click', () => {
    messagesEl.innerHTML = '';
    messagesEl.appendChild(welcomeEl);
    welcomeEl.style.display = '';
    showToast('Conversación limpiada');
  });

  // ── SUGGESTIONS ──
  document.querySelectorAll('.sug-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      inputEl.value = btn.textContent;
      sendBtn.classList.remove('off');
      inputEl.focus();
      sendMessage();
    });
  });

  // ── FORMAT TIME ──
  function now() {
    return new Date().toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit' });
  }

  // ── ADD MESSAGE ──
  function addMessage(content, role) {
    welcomeEl.style.display = 'none';

    const row = document.createElement('div');
    row.className = `msg-row ${role}`;

    const avatarChar = role === 'bot' ? '👔' : '👤';
    const time = now();

    row.innerHTML = `
      <div class="msg-avatar ${role}">${avatarChar}</div>
      <div>
        <div class="bubble">${escapeHtml(content).replace(/\n/g, '<br/>')}</div>
        <div class="bubble-meta">
          <span>${time}</span>
          ${role === 'user' ? '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 6L9 17l-5-5"/></svg>' : ''}
        </div>
      </div>`;

    messagesEl.appendChild(row);
    scrollToBottom();
  }

  // ── TYPING INDICATOR ──
  let typingEl = null;
  function showTyping() {
    typingEl = document.createElement('div');
    typingEl.className = 'msg-row bot';
    typingEl.id = 'typing-row';
    typingEl.innerHTML = `
      <div class="msg-avatar bot">🤖</div>
      <div class="bubble typing-bubble">
        <span></span><span></span><span></span>
      </div>`;
    messagesEl.appendChild(typingEl);
    scrollToBottom();
  }
  function hideTyping() {
    const el = document.getElementById('typing-row');
    if (el) el.remove();
  }

  // ── SCROLL ──
  function scrollToBottom() {
    setTimeout(() => messagesEl.scrollTo({ top: messagesEl.scrollHeight, behavior: 'smooth' }), 50);
  }

  // ── TOAST ──
  function showToast(msg, isError = false) {
    toastEl.textContent = msg;
    toastEl.className = 'toast show' + (isError ? ' error' : '');
    setTimeout(() => toastEl.className = 'toast', 3000);
  }

  // ── ESCAPE HTML ──
  function escapeHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // ── SEND MESSAGE ──
  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text || isThinking) return;

    addMessage(text, 'user');
    inputEl.value = '';
    inputEl.style.height = 'auto';
    sendBtn.classList.add('off');

    isThinking = true;
    statusEl.textContent = 'Escribiendo…';
    showTyping();

    try {
      const res = await fetch(N8N_WEBHOOK_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text, sessionId })
      });

      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();

      // Support multiple response structures
      const reply =
        data.output ||
        data.text ||
        data.message ||
        data.response ||
        (data[0] && (data[0].output || data[0].text || data[0].message)) ||
        'Sin respuesta';

      hideTyping();
      addMessage(reply, 'bot');
      statusEl.textContent = 'En línea · Listo para ayudarte';

    } catch (err) {
      hideTyping();
      console.error(err);

      // ── DEMO MODE (no webhook configured) ──
      if (N8N_WEBHOOK_URL.includes('YOUR-N8N')) {
        const demos = [
          '¡Hola! .',
        ];
        addMessage(demos[Math.floor(Math.random()*demos.length)], 'bot');
        statusEl.textContent = 'Modo demo · Configura el webhook';
      } else {
        addMessage('Hubo un error al conectar con el agente. Por favor intenta de nuevo.', 'bot');
        showToast('Error de conexión con n8n', true);
        statusEl.textContent = 'Error de conexión';
        setTimeout(() => statusEl.textContent = 'En línea · Listo para ayudarte', 4000);
      }
    }

    isThinking = false;
    sendBtn.classList.toggle('off', !inputEl.value.trim());
    inputEl.focus();
  }
</script>
</body>
</html>
